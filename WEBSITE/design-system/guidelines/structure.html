<!-- @dsCard group="Spacing" viewport="700x160" name="Structure" subtitle="radius 0 always · 1px hairlines · 720px measure" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:20px 24px;background:var(--or-bone);color:var(--or-ink);font-family:var(--or-font-sans);} .mono{font-family:var(--or-font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--or-muted);} a{color:var(--or-oxblood)} a:hover{color:var(--or-maroon)}</style></head>
<body><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
<div style="border:1px solid var(--or-hairline);padding:14px;"><div class="mono" style="margin-bottom:6px;">--or-radius</div><div style="font-size:22px;font-weight:600;">0</div><div style="font-size:12px;color:var(--or-muted);">Sharp corners, always</div></div>
<div style="border:1px solid var(--or-hairline);padding:14px;"><div class="mono" style="margin-bottom:6px;">--or-border</div><div style="font-size:22px;font-weight:600;">1px</div><div style="font-size:12px;color:var(--or-muted);">Hairline rules, no shadows</div></div>
<div style="border:1px solid var(--or-hairline);padding:14px;"><div class="mono" style="margin-bottom:6px;">--or-maxw</div><div style="font-size:22px;font-weight:600;">720px</div><div style="font-size:12px;color:var(--or-muted);">Text measure</div></div>
</div></body>
</html>
