<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px base — generous whitespace; let it breathe" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:20px 24px;background:var(--or-bone);color:var(--or-ink);font-family:var(--or-font-sans);} .mono{font-family:var(--or-font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--or-muted);} a{color:var(--or-oxblood)} a:hover{color:var(--or-maroon)}</style></head>
<body><div style="display:grid;gap:6px;">
<div style="display:flex;align-items:center;gap:12px;"><span class="mono" style="min-width:70px;">--or-s1</span><div style="width:4px;height:12px;background:var(--or-oxblood);"></div><span class="mono">4px</span></div>
<div style="display:flex;align-items:center;gap:12px;"><span class="mono" style="min-width:70px;">--or-s2</span><div style="width:8px;height:12px;background:var(--or-oxblood);"></div><span class="mono">8px</span></div>
<div style="display:flex;align-items:center;gap:12px;"><span class="mono" style="min-width:70px;">--or-s3</span><div style="width:12px;height:12px;background:var(--or-oxblood);"></div><span class="mono">12px</span></div>
<div style="display:flex;align-items:center;gap:12px;"><span class="mono" style="min-width:70px;">--or-s4</span><div style="width:16px;height:12px;background:var(--or-oxblood);"></div><span class="mono">16px</span></div>
<div style="display:flex;align-items:center;gap:12px;"><span class="mono" style="min-width:70px;">--or-s5</span><div style="width:24px;height:12px;background:var(--or-oxblood);"></div><span class="mono">24px</span></div>
<div style="display:flex;align-items:center;gap:12px;"><span class="mono" style="min-width:70px;">--or-s6</span><div style="width:32px;height:12px;background:var(--or-oxblood);"></div><span class="mono">32px</span></div>
<div style="display:flex;align-items:center;gap:12px;"><span class="mono" style="min-width:70px;">--or-s7</span><div style="width:48px;height:12px;background:var(--or-oxblood);"></div><span class="mono">48px</span></div>
<div style="display:flex;align-items:center;gap:12px;"><span class="mono" style="min-width:70px;">--or-s8</span><div style="width:64px;height:12px;background:var(--or-oxblood);"></div><span class="mono">64px</span></div>
<div style="display:flex;align-items:center;gap:12px;"><span class="mono" style="min-width:70px;">--or-s9</span><div style="width:96px;height:12px;background:var(--or-oxblood);"></div><span class="mono">96px</span></div>
</div></body>
</html>
