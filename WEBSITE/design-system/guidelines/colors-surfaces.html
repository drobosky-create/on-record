<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & Rules" subtitle="Bone is the paper; hairlines separate flat surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:20px 24px;background:var(--or-bone);color:var(--or-ink);font-family:var(--or-font-sans);} .mono{font-family:var(--or-font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--or-muted);} a{color:var(--or-oxblood)} a:hover{color:var(--or-maroon)}</style></head>
<body><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
<div style="border:1px solid var(--or-hairline);"><div style="height:64px;background:#F1ECE1;"></div><div style="padding:8px 10px;"><div style="font-size:13px;font-weight:500;">Bone</div><div class="mono">#F1ECE1 · --or-bone</div></div></div>
<div style="border:1px solid var(--or-hairline);"><div style="height:64px;background:#E7E0D2;"></div><div style="padding:8px 10px;"><div style="font-size:13px;font-weight:500;">Paper 2</div><div class="mono">#E7E0D2 · --or-paper-2</div></div></div>
<div style="border:1px solid var(--or-hairline);"><div style="height:64px;background:#D7CFBE;"></div><div style="padding:8px 10px;"><div style="font-size:13px;font-weight:500;">Hairline</div><div class="mono">#D7CFBE · --or-hairline</div></div></div>
<div style="border:1px solid var(--or-hairline);"><div style="height:64px;background:#2A2A2A;"></div><div style="padding:8px 10px;"><div style="font-size:13px;font-weight:500;">Hairline · dark</div><div class="mono">#2A2A2A · --or-hairline-d</div></div></div>
</div></body>
</html>
