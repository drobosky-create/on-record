<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:20px 24px;background:var(--or-bone);color:var(--or-ink);font-family:var(--or-font-sans);} .mono{font-family:var(--or-font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--or-muted);} .cover{position:relative;width:140px;height:210px;border-radius:2px 5px 5px 2px;box-shadow:0 10px 24px rgba(20,20,19,0.35),0 1px 4px rgba(20,20,19,0.25);} .cover .spine{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px;background:linear-gradient(90deg,rgba(255,255,255,0.07),rgba(0,0,0,0.28) 60%,rgba(255,255,255,0.04));} .cover .sheen{position:absolute;inset:0;border-radius:2px 5px 5px 2px;background:linear-gradient(120deg,rgba(255,255,255,0.045) 0%,rgba(255,255,255,0) 34%,rgba(0,0,0,0.10) 100%);} .cover .mark{position:absolute;left:0;right:0;bottom:22px;display:flex;justify-content:center;} .cover .mark span{font-size:7px;font-weight:500;letter-spacing:0.5em;text-indent:0.5em;line-height:1;white-space:nowrap;background:var(--or-foil);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;} a{color:var(--or-oxblood)} a:hover{color:var(--or-maroon)}</style></head>
<body><div style="display:flex;gap:32px;justify-content:center;">
<div style="display:flex;flex-direction:column;gap:8px;align-items:center;"><div class="cover" style="background:var(--or-cloth-black);"><div class="spine"></div><div class="sheen"></div><div class="mark"><span>MAN ON RECORD</span></div></div><div class="mono">Black · ~#161615</div></div>
<div style="display:flex;flex-direction:column;gap:8px;align-items:center;"><div class="cover" style="background:var(--or-cloth-oxblood);"><div class="spine"></div><div class="sheen"></div><div class="mark"><span>WOMAN ON RECORD</span></div></div><div class="mono">Oxblood · ~#4A0E10</div></div>
<div style="display:flex;flex-direction:column;gap:8px;align-items:center;"><div class="cover" style="background:var(--or-cloth-maroon);"><div class="spine"></div><div class="sheen"></div><div class="mark"><span>THE COMMON RECORD</span></div></div><div class="mono">Dark maroon · ~#2E1214</div></div>
</div></body>
</html>
